name: Auto Update npins

on:
  schedule:
    - cron: '30 19 * * *' # 03:30 Beijing Time (UTC+8)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-npins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Nix
        uses: cachix/install-nix-action@master
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Get hosts with npins
        id: get-hosts
        run: |
          hosts=$(bash .github/scripts/get-hosts.sh --filter-npins)
          echo "hosts=$hosts" >> $GITHUB_OUTPUT

      - name: Update npins for each host
        run: |
          hosts='${{ steps.get-hosts.outputs.hosts }}'
          # Ensure jq is available (it is on ubuntu-latest)
          for host in $(echo "$hosts" | jq -r '.[]'); do
            echo "Updating npins for host: $host"
            cd "vps/$host"
            # Using nixpkgs from the nix-command to get npins
            nix shell nixpkgs#npins -c npins update
            cd - > /dev/null
          done

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore(deps): update npins dependencies"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          signoff: false
          branch: auto-update-npins
          delete-branch: true
          title: "chore(deps): update npins dependencies"
          body: |
            Automated npins dependency update.
            
            This PR updates the `npins/sources.json` for all hosts in the repository that use `npins`.
            
            Generated by GitHub Actions.
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
