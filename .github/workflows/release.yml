name: Release System Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHIX_SUBSTITUTERS: https://cache.nixos.org https://attic.xuyh0120.win/lantian https://cache.garnix.io
  CACHIX_PUBLIC_KEYS: cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

jobs:
  setup-hosts:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.set-hosts.outputs.hosts }}
    steps:
      - uses: actions/checkout@main
      - id: set-hosts
        run: echo "hosts=$(bash .github/scripts/get-hosts.sh)" >> $GITHUB_OUTPUT

  build:
    needs: setup-hosts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.setup-hosts.outputs.hosts) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Nix
        uses: cachix/install-nix-action@master
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          enable_kvm: true
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = kvm big-parallel nixos-test
            substituters = ${{ env.CACHIX_SUBSTITUTERS }}
            trusted-public-keys = ${{ env.CACHIX_PUBLIC_KEYS }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Build Disko Images
        run: |
          nix-build "vps/${{ matrix.host }}" \
            --option substituters "${{ env.CACHIX_SUBSTITUTERS }}" \
            --option trusted-public-keys "${{ env.CACHIX_PUBLIC_KEYS }}" \
            -o result

      - name: Prepare and Compress Image
        run: |
          cp result/*.raw ${{ matrix.host }}.raw
          tar -I "zstd -19 -T0" -cf ${{ matrix.host }}.tar.zst ${{ matrix.host }}.raw

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: image-${{ matrix.host }}
          path: ${{ matrix.host }}.tar.zst
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@main
        with:
          pattern: image-*
          merge-multiple: true

      - name: Generate Release Body
        run: |
          echo "System Raw Images Release" > release_body.md
          echo "" >> release_body.md
          echo "**Artifacts:**" >> release_body.md
          for f in *.tar.zst; do
            echo "- \`$f\`" >> release_body.md
          done

      - name: Generate Release Name
        id: release_name
        run: |
          if [ "${{ github.ref_name }}" == "pre-release" ]; then
            RELEASE_NAME="Pre-Release $(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA:0:7}"
            echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          else
            RELEASE_NAME="Release ${{ inputs.version || github.ref_name }} ($(date +'%Y%m%d'))"
            echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'pre-release' && 'pre-release-latest' || inputs.version || github.ref_name }}
          name: ${{ steps.release_name.outputs.name }}
          body_path: release_body.md
          files: "*.tar.zst"
          prerelease: ${{ github.ref_name == 'pre-release' }}
          generate_release_notes: true
